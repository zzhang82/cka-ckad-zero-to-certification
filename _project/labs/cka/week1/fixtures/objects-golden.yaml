apiVersion: apps/v1
kind: Deployment
metadata:
  name: object-web
  namespace: week1-objects
  labels:
    app.kubernetes.io/name: object-web
    lab.cka-ckad.dev/week: week-01
  annotations:
    lab.cka-ckad.dev/owner: learner
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: object-web
      lab.cka-ckad.dev/week: week-01
  template:
    metadata:
      labels:
        app.kubernetes.io/name: object-web
        lab.cka-ckad.dev/week: week-01
    spec:
      containers:
        - name: web
          image: registry.k8s.io/e2e-test-images/agnhost:2.53@sha256:99c6b4bb4a1e1df3f0b3752168c89358794d02258ebebc26bf21c29399011a85
          args: [netexec, --http-port=8080]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: object-web
  namespace: week1-objects
spec:
  selector:
    app.kubernetes.io/name: object-web
  ports:
    - name: http
      port: 80
      targetPort: http
