apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug-web
  namespace: week1-debug
spec:
  replicas: 2
  selector:
    matchLabels:
      app: debug-web
  template:
    metadata:
      labels:
        app: debug-web
    spec:
      containers:
        - name: web
          image: registry.k8s.io/e2e-test-images/agnhost:2.53@sha256:99c6b4bb4a1e1df3f0b3752168c89358794d02258ebebc26bf21c29399011a85
          args: [netexec, --http-port=8080]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: debug-web
  namespace: week1-debug
spec:
  selector:
    app: debug-web
  ports:
    - name: http
      port: 80
      targetPort: http
