apiVersion: v1
kind: Namespace
metadata:
  name: week0-smoke
  labels:
    app.kubernetes.io/part-of: cka-ckad-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: week0-smoke
  labels:
    app.kubernetes.io/name: week0-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: week0-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: week0-web
    spec:
      containers:
        - name: web
          image: registry.k8s.io/e2e-test-images/agnhost:2.53@sha256:99c6b4bb4a1e1df3f0b3752168c89358794d02258ebebc26bf21c29399011a85
          args:
            - netexec
            - --http-port=8080
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 2
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: week0-smoke
spec:
  selector:
    app.kubernetes.io/name: week0-web
  ports:
    - name: http
      port: 80
      targetPort: http
