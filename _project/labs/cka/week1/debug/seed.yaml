apiVersion: v1
kind: Namespace
metadata:
  name: week1-debug
  labels:
    app.kubernetes.io/part-of: cka-ckad-week1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug-web
  namespace: week1-debug
spec:
  replicas: 2
  selector:
    matchLabels:
      app: debug-web
  template:
    metadata:
      labels:
        app: debug-web
    spec:
      containers:
        - name: web
          image: registry.k8s.io/e2e-test-images/agnhost:does-not-exist
          args: [netexec, --http-port=8080]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: debug-web
  namespace: week1-debug
spec:
  selector:
    app: wrong-web
  ports:
    - name: http
      port: 80
      targetPort: http
