apiVersion: v1
kind: Namespace
metadata:
  name: week0-diagnostic
  labels:
    app.kubernetes.io/part-of: cka-ckad-lab
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: week0-diagnostic
data:
  MODE: broken
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: week0-diagnostic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diagnostic-web
  template:
    metadata:
      labels:
        app: diagnostic-web
    spec:
      containers:
        - name: web
          image: registry.k8s.io/e2e-test-images/agnhost:does-not-exist
          args: [netexec, --http-port=8080]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: week0-diagnostic
spec:
  selector:
    app: wrong-selector
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Pod
metadata:
  name: scheduled
  namespace: week0-diagnostic
spec:
  nodeSelector:
    diagnostic-ready: "true"
  containers:
    - name: pause
      image: registry.k8s.io/e2e-test-images/agnhost:2.53@sha256:99c6b4bb4a1e1df3f0b3752168c89358794d02258ebebc26bf21c29399011a85
      args: [pause]
